name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pin the Python version to match .python-version / the Dockerfile.
          python-version: "3.11"

      - name: Install dependencies
        # --frozen: install exactly what uv.lock pins; fail if the lock is stale.
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Check formatting (ruff)
        # --check: fail if any file isn't formatted, without modifying it.
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy backend

      - name: Run tests
        run: uv run pytest
