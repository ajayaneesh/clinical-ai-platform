name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pin the Python version to match .python-version / the Dockerfile.
          python-version: "3.11"

      - name: Install dependencies
        # --frozen: install exactly what uv.lock pins; fail if the lock is stale.
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Check formatting (ruff)
        # --check: fail if any file isn't formatted, without modifying it.
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy backend

      - name: Run tests
        run: uv run pytest

  docker:
    runs-on: ubuntu-latest
    # Only build the image if the test job passed first.
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          # Context is the repo root — where pyproject.toml, uv.lock, and
          # backend/ all live (the Dockerfile COPYs all three).
          context: .
          file: infrastructure/docker/Dockerfile
          # Build only; do not push to a registry.
          push: false
          # Cache layers between runs via GitHub Actions cache for faster builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
